name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

# Cancel in-flight runs on the same branch when a newer commit arrives. Saves
# Actions minutes and keeps PR queues green/red on the latest commit only.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scraper-api:
    name: scraper-api (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: scraper-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: scraper-api/package-lock.json

      # Skip the Playwright `postinstall` step in CI — we don't run browsers
      # in tests, and a full Chromium download adds 4+ minutes per matrix leg.
      - name: Install (no Playwright browsers)
        run: npm ci --ignore-scripts
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Unit tests
        run: node --test "lib/__tests__/*.test.js"

      - name: Dedup benchmark (correctness gate)
        # Asserts the bucketed dedup keeps the same survivor set as the naive
        # reference impl on a 1000-item synthetic corpus. Catches accidental
        # regressions where someone "optimises" dedup and silently drops items.
        run: node bench/dedup.js 1000 5

  mcp-server:
    name: mcp-server (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci

      - name: Unit tests
        run: node --test "__tests__/*.test.js"

  frontend:
    name: frontend lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true
