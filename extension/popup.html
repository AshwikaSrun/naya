<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #faf9f7;
      color: #000;
      overflow-y: auto;
    }
    .header {
      padding: 16px 18px 10px;
      text-align: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      background: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 20px; font-weight: 300; font-style: italic; letter-spacing: -0.02em; }
    .tagline { font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(0,0,0,0.25); margin-top: 3px; }
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      background: white;
      position: sticky;
      top: 52px;
      z-index: 10;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(0,0,0,0.3);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab.active { color: #000; border-bottom-color: #000; }
    .tab:hover { color: rgba(0,0,0,0.6); }
    .body { padding: 12px; }
    .status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: white;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 10px; margin-bottom: 10px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; flex-shrink: 0; }
    .status-text { font-size: 11px; color: rgba(0,0,0,0.5); }
    .stat-row {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .stat-box {
      flex: 1; padding: 10px;
      background: white; border: 1px solid rgba(0,0,0,0.05);
      border-radius: 10px; text-align: center;
    }
    .stat-num { font-size: 20px; font-weight: 300; color: #000; }
    .stat-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(0,0,0,0.25); margin-top: 2px; }
    .cta {
      display: block; width: 100%;
      padding: 10px; background: #000; color: #fff;
      border: none; border-radius: 9px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; text-align: center;
      text-decoration: none; cursor: pointer; transition: opacity 0.15s;
    }
    .cta:hover { opacity: 0.85; }
    .wishlist-list { list-style: none; }
    .wishlist-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; background: white;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 10px; margin-bottom: 6px;
      cursor: pointer; transition: all 0.15s;
      text-decoration: none; color: #000;
    }
    .wishlist-item:hover { border-color: rgba(0,0,0,0.12); }
    .wl-img {
      width: 44px; height: 44px; border-radius: 8px;
      object-fit: cover; background: #eee; flex-shrink: 0;
    }
    .wl-info { flex: 1; min-width: 0; }
    .wl-title { font-size: 12px; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wl-meta { font-size: 10px; color: rgba(0,0,0,0.35); margin-top: 2px; }
    .wl-price { font-size: 14px; font-weight: 500; color: #000; flex-shrink: 0; }
    .wl-remove {
      background: none; border: none; cursor: pointer;
      color: rgba(0,0,0,0.15); font-size: 14px; padding: 4px;
      transition: color 0.15s; flex-shrink: 0;
    }
    .wl-remove:hover { color: rgba(0,0,0,0.5); }
    .empty-state {
      text-align: center; padding: 24px 12px;
      color: rgba(0,0,0,0.25); font-size: 12px;
    }
    .footer {
      padding: 10px 18px; text-align: center;
      border-top: 1px solid rgba(0,0,0,0.05);
    }
    .footer-text { font-size: 8px; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(0,0,0,0.12); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">naya</div>
    <div class="tagline">resale price intelligence</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="home">Home</button>
    <button class="tab" data-tab="wishlist">Wishlist</button>
  </div>

  <div id="tab-home" class="body">
    <div class="status">
      <div class="dot"></div>
      <div class="status-text">Active on marketplace pages</div>
    </div>
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-num" id="stat-views">0</div>
        <div class="stat-label">Items Viewed</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-saved">0</div>
        <div class="stat-label">Saved</div>
      </div>
    </div>
    <a href="https://www.nayaeditorial.shop/insights" target="_blank" class="cta">
      Open Naya Insights
    </a>
  </div>

  <div id="tab-wishlist" class="body hidden">
    <ul class="wishlist-list" id="wishlist-list"></ul>
    <div class="empty-state hidden" id="wishlist-empty">
      No saved items yet.<br>Save listings while browsing to track prices.
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">naya — resale search engine</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
