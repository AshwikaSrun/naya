<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #faf9f7;
      color: #000;
    }
    .header {
      padding: 20px 20px 12px;
      text-align: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      background: white;
    }
    .logo {
      font-size: 22px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(0,0,0,0.3);
      margin-top: 4px;
    }
    .body {
      padding: 16px 20px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: white;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      flex-shrink: 0;
    }
    .status-text {
      font-size: 12px;
      color: rgba(0,0,0,0.6);
    }
    .info {
      font-size: 11px;
      color: rgba(0,0,0,0.35);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .cta {
      display: block;
      width: 100%;
      padding: 11px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .cta:hover { opacity: 0.85; }
    .footer {
      padding: 12px 20px;
      text-align: center;
      border-top: 1px solid rgba(0,0,0,0.05);
    }
    .footer-text {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">naya</div>
    <div class="tagline">price intelligence</div>
  </div>
  <div class="body">
    <div class="status">
      <div class="dot"></div>
      <div class="status-text">Active on marketplace pages</div>
    </div>
    <div class="info">
      Visit any listing on eBay, Grailed, Depop, or Poshmark to see cross-platform price comparisons and trend data.
    </div>
    <a href="https://www.nayaeditorial.shop/insights" target="_blank" class="cta">
      open naya insights
    </a>
  </div>
  <div class="footer">
    <div class="footer-text">naya — resale search engine</div>
  </div>
</body>
</html>
